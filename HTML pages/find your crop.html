<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find Your Crop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#eef8ee;
}

nav{
background:#2E8B57;
padding:15px;
}

nav ul{
display:flex;
justify-content:center;
list-style:none;
}

nav ul li{
margin:0 20px;
}

nav ul li a{
text-decoration:none;
color:white;
font-weight:bold;
}

.container{
width:450px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:25px;
color:#2E8B57;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:25px;
background:#2E8B57;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#256f47;
}

footer{
margin-top:40px;
background:#2E8B57;
padding:15px;
text-align:center;
color:white;
}

</style>

</head>

<body>

<nav>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="findyourcrop.html">Find Your Crop</a></li>

</ul>

</nav>

<div class="container">

<h2>Crop Prediction Form</h2>

<form action="/predict" method="POST">

<label>Nitrogen (N)</label>
<input type="number" name="Nitrogen" required>

<label>Phosphorous (P)</label>
<input type="number" name="Phosphorous" required>

<label>Potassium (K)</label>
<input type="number" name="Potassium" required>

<label>Temperature (°C)</label>
<input type="number" step="0.01" name="temperature" required>

<label>Humidity (%)</label>
<input type="number" step="0.01" name="humidity" required>

<label>pH Value</label>
<input type="number" step="0.01" name="ph" required>

<label>Rainfall (mm)</label>
<input type="number" step="0.01" name="rainfall" required>

<button type="submit">Predict Crop</button>

</form>

</div>

<footer>

© 2026 OptiCrop

</footer>

</body>
</html>
